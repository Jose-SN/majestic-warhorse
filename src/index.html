  <body>
    <script>
      // One-time: drop leftover Angular service workers / caches from when PWA was enabled.
      (function () {
        var KEY = 'mw-sw-cleanup-v1';
        if (localStorage.getItem(KEY) === 'done') return;

        var shouldReload = false;
        var finish = function () {
          localStorage.setItem(KEY, 'done');
          if (shouldReload) {
            location.reload();
          }
        };

        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              if (regs.length) shouldReload = true;
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          );
        }
        if ('caches' in window) {
          tasks.push(
            caches.keys().then(function (keys) {
              if (keys.length) shouldReload = true;
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          );
        }

        if (!tasks.length) {
          finish();
          return;
        }
        Promise.all(tasks).then(finish).catch(finish);
      })();
    </script>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
