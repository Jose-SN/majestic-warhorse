<div class="fixed bottom-8 right-8 z-50">

</button>

<script>
    // Micro-interactions and atmospheric logic
    document.addEventListener('mousemove', (e) => {
      const { clientX, clientY } = e;
      const xPos = (clientX / window.innerWidth - 0.5) * 10;
      const yPos = (clientY / window.innerHeight - 0.5) * 10;
      
      // Gentle parallax effect for the left image
      const bgImage = document.querySelector('section:first-child div');
      if (bgImage) {
        bgImage.style.transform = `scale(1.05) translate(${xPos}px, ${yPos}px)`;
      }
    });

    // Form submission feedback
    const loginForm = document.querySelector('form');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> AUTHENTICATING...</span>';
      btn.disabled = true;
      
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('Authentication Sequence Initiated. (Demo Mode)');
      }, 2000);
    });
  </script>
