<div class="search-and-profile">
  <div class="mobile-brand-header">
    <div class="mobile-brand-header__identity">
      <figure class="mobile-brand-header__logo">
        <img src="assets/images/logo-majestic-hourse.svg" alt="Majestic Warhorse" />
      </figure>
      <div class="mobile-brand-header__text">
        <h1>MAKING OF</h1>
        <p>MAJESTIC WARHORSE</p>
      </div>
    </div>
    <button type="button" class="mobile-brand-header__notify" aria-label="Notifications">
      <span class="material-symbols-outlined">notifications</span>
      <span class="mobile-brand-header__notify-dot" aria-hidden="true"></span>
    </button>
  </div>

  <h1 class="page-title">
    <figure>
      <img src="../../../assets/images/icon-home.svg" alt="Home" />
    </figure>
    <span>Home</span>
  </h1>
  <div class="search-left">
    <div class="search-holder">
      <div class="input-holder">
        <input type="text" placeholder="Search for..." [(ngModel)]="searchText" (input)="setInputSearch()" />
        <button type="button" aria-label="Search button"></button>
      </div>
    </div>
    <div class="profile-area">
      <div class="notification-holder">
        <figure>
          <img src="../../../assets/images/icon-notification.svg" alt="Notification" />
        </figure>
      </div>
    </div>
  </div>
  <div class="menu btn6" data-menu="6" [class.open]="isMobileNav" (click)="btnMob()">
    <div class="icon"></div>
  </div>
</div>
