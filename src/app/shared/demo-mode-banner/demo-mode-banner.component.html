@if (demoModeService.demoMode$ | async) {
  <div class="demo-mode-banner" role="status" aria-live="polite">
    <div class="demo-mode-banner__content">
      <span class="demo-mode-banner__label">Demo mode</span>
      <p class="demo-mode-banner__message">
        You are viewing sample data. Live API values are hidden until you exit demo mode.
      </p>
    </div>
    <button
      type="button"
      class="demo-mode-banner__close"
      aria-label="Exit demo mode"
      (click)="exitDemoMode()"
    >
      <span aria-hidden="true">&times;</span>
      <span class="demo-mode-banner__close-text">X</span>
    </button>
  </div>
}
