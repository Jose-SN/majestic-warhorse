<section class="login-main-container">
  <section class="login-container">
    <div class="login-wrapper">
      <figure>
        <img src="../../../assets/images/logo-mejestic-hourse-landing.svg" alt="Mejastic Hourse" />
      </figure>
      <h1>Welcome back!</h1>
      <!-- <p>Etiam quis quam urna. Aliquam odio erat, accumsan eu nulla in</p> -->
      <div class="form-wrapper">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="input-holder account-type-holder">
            <label class="account-type-label">Sign in as</label>
            <div class="account-type-cards" role="group" aria-label="Account type">
              <label class="account-type-card">
                <input type="radio" name="accountType" formControlName="accountType" value="user">
                <span class="card-inner">
                  <span class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  </span>
                  <span class="card-text">
                    <span class="card-title">User</span>
                    <span class="card-desc">Student or Teacher</span>
                  </span>
                </span>
              </label>
              <label class="account-type-card">
                <input type="radio" name="accountType" formControlName="accountType" value="organization">
                <span class="card-inner">
                  <span class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                  </span>
                  <span class="card-text">
                    <span class="card-title">Organization</span>
                    <span class="card-desc">Manage teachers & students</span>
                  </span>
                </span>
              </label>
            </div>
          </div>
          <div class="input-holder">
            <label for="email">Email</label>
            <input
              type="text"
              name="email"
              placeholder="example@email.com"
              formControlName="email"
              required
            />
            @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
              <span>Email is required</span>
            }
          </div>
          <div class="input-holder">
            <label for="password">Password</label>
            <input
              type="password"
              name="password"
              placeholder="Enter Your Password (6 characters)"
              formControlName="password"
              required
            />
            @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
              <span>Password is required</span>
            }
          </div>
          <a (click)="gotoPage('forgetpassword')" class="cursor-pointer">Forget Password?</a>
          <button class="btn-login" type="submit">Log In</button>
        </form>
      </div>
      <div class="login-bottom">
        <div class="divider" data-attr="or"></div>
        <!-- <div class="btn-holder">
          <button type="button">
            <figure><img src="../../../assets/images/icon-google.svg" alt="Google" /></figure>
            Google
          </button>
          <button type="button">
            <figure><img src="../../../assets/images/icon-facebook.svg" alt="Faccebook" /></figure>
            Facebook
          </button>
        </div> -->
        <p>Don’t You have an account? <a class="cursor-pointer" (click)="gotoPage('signup')">Sign Up</a></p>
      </div>
    </div>
  </section>
</section>
