<section class="dashboard-container">
  <div class="dashboard-left" [ngClass]="{'active': isMobileNav}" [style.pointer-events]="activePanel === SIDE_PANEL_LIST['APPROVAL_PENDING'] ? 'none' : 'auto'">
    <app-dashboard-sidepanel></app-dashboard-sidepanel>
  </div>
  <div class="dashboard-right">
    <app-search-profile (mobNavchild)="btnMobileMenu()"></app-search-profile>
    <div class="common-container">
      <router-outlet></router-outlet>
    </div>
  </div>

  <nav class="dashboard-mobile-nav" aria-label="Mobile navigation">
    <button
      type="button"
      class="dashboard-mobile-nav__item"
      [class.is-active]="isMobileNavActive('overview')"
      (click)="navigateMobile('overview')"
    >
      <span class="material-symbols-outlined" [style.font-variation-settings]="isMobileNavActive('overview') ? '\'FILL\' 1' : '\'FILL\' 0'">dashboard</span>
      <span>Home</span>
    </button>
    <button
      type="button"
      class="dashboard-mobile-nav__item"
      [class.is-active]="isMobileNavActive('courses')"
      (click)="navigateMobile('courses')"
    >
      <span class="material-symbols-outlined">menu_book</span>
      <span>Courses</span>
    </button>
    <button type="button" class="dashboard-mobile-nav__fab" aria-label="Quick action" (click)="navigateMobile('courses')">
      <span class="material-symbols-outlined">add</span>
    </button>
    <button
      type="button"
      class="dashboard-mobile-nav__item"
      [class.is-active]="isMobileNavActive('network')"
      (click)="navigateMobile('network')"
    >
      <span class="material-symbols-outlined">group</span>
      <span>Network</span>
    </button>
    <button
      type="button"
      class="dashboard-mobile-nav__item"
      [class.is-active]="isMobileNavActive('account')"
      (click)="navigateMobile('account')"
    >
      <span class="material-symbols-outlined">account_circle</span>
      <span>Profile</span>
    </button>
  </nav>
</section>
